{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Afvalwijzer</h1>
    <button id="btn-create-tasks" class="btn btn-primary hidden">Taken nu aanmaken</button>
</div>

<section class="settings-section">
    <div class="toggle">
        <div>
            <div style="font-weight:600;font-size:15px">Afvaltaken aanmaken</div>
            <div style="color:var(--text-muted);font-size:13px;margin-top:2px">
                Automatisch taken aanmaken op basis van het ophaalschema van mijnafvalwijzer.nl
            </div>
        </div>
        <label class="switch">
            <input type="checkbox" id="afval-enabled">
            <span class="slider"></span>
        </label>
    </div>
</section>

<section class="settings-section" id="afval-address-section" style="display:none">
    <h2 class="section-title">Adresgegevens</h2>
    <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="margin-bottom:0">
            <label>Postcode</label>
            <input type="text" id="afval-postcode" placeholder="1234AB" style="max-width:120px">
        </div>
        <div class="form-group" style="margin-bottom:0">
            <label>Huisnummer</label>
            <input type="text" id="afval-huisnummer" placeholder="1A" style="max-width:100px">
        </div>
        <button id="btn-sync" class="btn btn-primary">Synchroniseren</button>
        <span id="sync-status" style="color:var(--text-muted);font-size:13px;align-self:center"></span>
    </div>
</section>

<section class="settings-section" id="afval-types-section" style="display:none">
    <h2 class="section-title">Afvaltypes</h2>
    <ul id="afval-types-list" style="list-style:none;padding:0;margin:0"></ul>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/icon-picker.js"></script>
<script src="/static/js/admin_afvalwijzer.js"></script>
{% endblock %}
