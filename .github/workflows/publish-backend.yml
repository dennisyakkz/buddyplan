name: Publish backend image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 1.0.0 or test-2026-07-12)"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: buddyplan-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            PUSH_LATEST=true
          else
            TAG="${{ inputs.tag }}"
            PUSH_LATEST=false
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "push_latest=$PUSH_LATEST" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner for GHCR
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Prepare image tags
        id: tags
        run: |
          TAGS="ghcr.io/${OWNER}/${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
          if [ "${{ steps.meta.outputs.push_latest }}" = "true" ]; then
            TAGS="${TAGS},ghcr.io/${OWNER}/${IMAGE_NAME}:latest"
          fi
          echo "list=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.list }}
